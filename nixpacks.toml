[phases.setup]
nixPkgs = ["php82", "php82Packages.composer", "nginx"]

[phases.install]
cmds = ["composer install --no-dev --optimize-autoloader --no-interaction --no-scripts"]

[phases.build]
cmds = [
  "composer dump-env prod",
  "php bin/console cache:clear --env=prod --no-debug",
  "php bin/console assets:install public --env=prod"
]

[start]
cmd = "php bin/console doctrine:migrations:migrate --no-interaction --env=prod && NGINX_INCLUDE_DIR=$(grep -Eo '/etc/nginx/(conf\\.d|http\\.d)' /etc/nginx/nginx.conf | head -n1 || true) && NGINX_INCLUDE_DIR=${NGINX_INCLUDE_DIR:-/etc/nginx/conf.d} && mkdir -p \"$NGINX_INCLUDE_DIR\" && sed \"s/\\$PORT/${PORT:-8080}/g\" nginx.conf > \"$NGINX_INCLUDE_DIR/default.conf\" && php-fpm & nginx -g 'daemon off;'"
