[phases.setup]
nixPkgs = ["php82", "php82Packages.composer", "nginx"]

[phases.install]
cmds = ["composer install --no-dev --optimize-autoloader --no-interaction --no-scripts"]

[phases.build]
cmds = [
  "composer dump-env prod",
  "php bin/console cache:clear --env=prod --no-debug",
  "php bin/console assets:install public --env=prod",
  "cp nginx.conf /etc/nginx/conf.d/default.conf"
]

[start]
cmd = "php bin/console doctrine:migrations:migrate --no-interaction --env=prod && php-fpm & nginx -g 'daemon off;'"
